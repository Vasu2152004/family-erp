version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    restart: always
    environment:
      - PORT=${PORT:-80}
    # Railway will inject .env automatically
    # No need for env_file in Railway

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    restart: always
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction
        sleep 60
      done"
    depends_on:
      - app

# Note: Railway handles web server and database separately
# Use Railway's managed MySQL instead of Docker MySQL
# Railway serves PHP directly, no Nginx needed

